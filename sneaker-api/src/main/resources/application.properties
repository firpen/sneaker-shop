quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.scripts.generation=drop-and-create
quarkus.hibernate-orm.scripts.generation.create-target=create.ddl
quarkus.hibernate-orm.scripts.generation.drop-target=drop.ddl
quarkus.hibernate-orm.log.sql=true

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${FRONTEND_ORIGIN:http://localhost:3000}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=http://localhost:5050/issuer

quarkus.native.resources.includes=publicKey.pem 
smallrye.jwt.sign.key.location=privateKey.pem

mp.jwt.token.header=Cookie
mp.jwt.token.cookie=token
smallrye.jwt.always-check-authorization=true

sneaker.stripe.secret-key=${STRIPE_SECRET_KEY:}